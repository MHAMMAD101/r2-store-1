<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة التسوق | R2 STORE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="images/logo.png">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --success: #10b981;
            --danger: #ef4444;
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --bg-hover: #1a1a25;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --border: rgba(255, 255, 255, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', 'Segoe UI', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-primary); line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
        .header { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 1rem 0; position: sticky; top: 0; z-index: 100; }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 1rem; text-decoration: none; }
        .logo-circle { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .logo-circle img { width: 100%; height: 100%; object-fit: cover; }
        .logo-text { font-size: 1.5rem; font-weight: 900; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-actions { display: flex; gap: 1rem; align-items: center; }
        .btn { padding: 0.75rem 1.5rem; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 0.5rem; transition: all 0.3s; text-decoration: none; font-size: 1rem; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4); }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text-primary); }
        .btn-outline:hover { border-color: var(--primary); }
        .cart-page { padding: 4rem 0; min-height: 100vh; }
        .page-title { font-size: 2rem; margin-bottom: 2rem; display: flex; align-items: center; gap: 0.75rem; }
        .page-title i { color: var(--primary); }
        .cart-grid { display: grid; grid-template-columns: 1fr 400px; gap: 2rem; }
        .cart-items-card { background: var(--bg-card); border-radius: 20px; padding: 2rem; border: 1px solid var(--border); }
        .cart-item { display: flex; gap: 1.5rem; padding: 1.5rem; background: var(--bg-dark); border-radius: 16px; margin-bottom: 1.5rem; border: 1px solid var(--border); transition: all 0.3s; }
        .cart-item:hover { border-color: var(--primary); transform: translateX(-5px); }
        .cart-item-image { width: 100px; height: 100px; border-radius: 12px; background: var(--bg-hover); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; flex-shrink: 0; overflow: hidden; }
        .cart-item-image img { width: 100%; height: 100%; object-fit: cover; }
        .cart-item-info { flex: 1; }
        .cart-item-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }
        .cart-item-price { color: var(--primary); font-weight: 700; font-size: 1.1rem; margin-bottom: 1rem; }
        .quantity-control { display: flex; align-items: center; gap: 1rem; }
        .quantity-btn { width: 35px; height: 35px; border-radius: 10px; border: 2px solid var(--border); background: var(--bg-card); color: var(--text-primary); cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
        .quantity-btn:hover { background: var(--primary); border-color: var(--primary); transform: scale(1.1); }
        .quantity-value { font-weight: 700; min-width: 40px; text-align: center; }
        .cart-item-total { text-align: left; min-width: 100px; }
        .cart-item-total-label { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.25rem; }
        .cart-item-total-value { font-size: 1.25rem; font-weight: 700; color: var(--primary); }
        .remove-btn { background: var(--danger); color: white; border: none; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-size: 0.85rem; transition: all 0.3s; margin-top: 1rem; }
        .remove-btn:hover { background: #dc2626; transform: scale(1.05); }
        .empty-cart { text-align: center; padding: 4rem 2rem; }
        .empty-cart i { font-size: 5rem; color: var(--text-muted); margin-bottom: 1.5rem; }
        .empty-cart h3 { font-size: 1.5rem; margin-bottom: 1rem; }
        .empty-cart p { color: var(--text-muted); margin-bottom: 2rem; }
        .cart-summary { background: var(--bg-card); border-radius: 20px; padding: 2rem; border: 1px solid var(--border); height: fit-content; position: sticky; top: 100px; }
        .summary-title { font-size: 1.5rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
        .summary-row:last-child { border-bottom: none; }
        .summary-row.total { font-size: 1.4rem; font-weight: 800; color: var(--primary); margin-top: 1rem; padding-top: 1rem; border-top: 2px solid var(--border); }
        .discount-section { background: var(--bg-dark); border-radius: 16px; padding: 1.5rem; margin: 1.5rem 0; border: 2px solid var(--border); }
        .discount-section h4 { margin-bottom: 1rem; color: var(--primary); display: flex; align-items: center; gap: 0.5rem; }
        .discount-input-group { display: flex; gap: 0.75rem; }
        .discount-input { flex: 1; padding: 0.75rem 1rem; background: var(--bg-card); border: 2px solid var(--border); border-radius: 12px; color: var(--text-primary); font-size: 1rem; transition: all 0.3s; text-transform: uppercase; }
        .discount-input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
        .discount-btn { padding: 0.75rem 1.5rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: all 0.3s; white-space: nowrap; }
        .discount-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(99, 102, 241, 0.4); }
        .discount-btn:disabled { background: var(--text-muted); cursor: not-allowed; transform: none; }
        .discount-message { margin-top: 0.75rem; padding: 0.75rem; border-radius: 10px; font-size: 0.9rem; display: none; }
        .discount-message.success { display: block; background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); color: var(--success); }
        .discount-message.error { display: block; background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: var(--danger); }
        .discount-applied { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); border-radius: 10px; margin-top: 0.75rem; }
        .discount-applied-text { color: var(--success); font-weight: 700; font-size: 0.9rem; }
        .discount-remove-btn { background: var(--danger); color: white; border: none; padding: 0.25rem 0.75rem; border-radius: 8px; cursor: pointer; font-size: 0.85rem; transition: all 0.3s; }
        .discount-remove-btn:hover { background: #dc2626; transform: scale(1.05); }
        .summary-row.discount { color: var(--success); font-weight: 700; }
        .checkout-btn { width: 100%; padding: 1.2rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; border-radius: 16px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: all 0.3s; margin-top: 1.5rem; box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3); }
        .checkout-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(99, 102, 241, 0.5); }
        .checkout-btn:disabled { background: var(--text-muted); cursor: not-allowed; transform: none; box-shadow: none; }
        .continue-shopping { display: block; text-align: center; margin-top: 1.5rem; color: var(--text-secondary); text-decoration: none; transition: all 0.3s; }
        .continue-shopping:hover { color: var(--primary); }
        .footer { background: var(--bg-card); border-top: 1px solid var(--border); padding: 2rem 0; margin-top: 4rem; }
        .footer-content { text-align: center; color: var(--text-muted); }
        @media (max-width: 968px) { .cart-grid { grid-template-columns: 1fr; } .cart-summary { position: static; } .cart-item { flex-direction: column; } .cart-item-image { width: 100%; height: 150px; } .cart-item-total { text-align: right; margin-top: 1rem; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">
                    <div class="logo-circle"><img src="images/logo.png" alt="R2" onerror="this.style.display='none'"></div>
                    <span class="logo-text">STORE</span>
                </a>
                <div class="nav-actions">
                    <a href="index.html" class="btn btn-outline"><i class="fas fa-store"></i> المتجر</a>
                    <a href="index.html" class="btn btn-primary"><i class="fas fa-home"></i> الرئيسية</a>
                </div>
            </div>
        </div>
    </header>

    <div class="cart-page">
        <div class="container">
            <h1 class="page-title"><i class="fas fa-shopping-cart"></i> سلة التسوق</h1>
            
            <div class="cart-grid">
                <div class="cart-items-card">
                    <div id="cartItemsContainer"></div>
                </div>

                <div class="cart-summary">
                    <h2 class="summary-title"><i class="fas fa-receipt"></i> ملخص الطلب</h2>
                    
                    <div class="summary-row">
                        <span>عدد المنتجات:</span>
                        <span id="summaryCount">0</span>
                    </div>
                    
                    <div class="summary-row">
                        <span>المجموع الفرعي:</span>
                        <span id="summarySubtotal">0 $</span>
                    </div>
                    
                    <div class="discount-section">
                        <h4><i class="fas fa-tag"></i> كود الخصم</h4>
                        <div class="discount-input-group">
                            <input type="text" id="discountCode" class="discount-input" placeholder="أدخل الكود" maxlength="20">
                            <button class="discount-btn" onclick="applyDiscount()" id="applyDiscountBtn">
                                <i class="fas fa-check"></i> تطبيق
                            </button>
                        </div>
                        <div id="discountMessage" class="discount-message"></div>
                        <div id="discountApplied" class="discount-applied" style="display: none;">
                            <span class="discount-applied-text" id="discountAppliedText"></span>
                            <button class="discount-remove-btn" onclick="removeDiscount()">
                                <i class="fas fa-times"></i> إزالة
                            </button>
                        </div>
                    </div>
                    
                    <div class="summary-row discount" id="discountRow" style="display: none;">
                        <span>الخصم:</span>
                        <span id="discountAmount">-0 $</span>
                    </div>
                    
                    <div class="summary-row total">
                        <span>الإجمالي:</span>
                        <span id="summaryTotal">0 $</span>
                    </div>
                    
                    <button class="checkout-btn" onclick="proceedToCheckout()" id="checkoutBtn">
                        <i class="fas fa-credit-card"></i> إتمام الشراء
                    </button>
                    
                    <a href="index.html" class="continue-shopping">
                        <i class="fas fa-arrow-right"></i> متابعة التسوق
                    </a>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>© 2024 <strong>R2 STORE</strong>. جميع الحقوق محفوظة</p>
            </div>
        </div>
    </footer>

    <script>
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        let appliedDiscount = null;
        let discountCodes = {
            'WELCOME10': { type: 'percent', value: 10, description: 'خصم 10%' },
            'SAVE20': { type: 'percent', value: 20, description: 'خصم 20%' },
            'FIXED5': { type: 'fixed', value: 5, description: 'خصم 5$' },
            'FIXED10': { type: 'fixed', value: 10, description: 'خصم 10$' },
            'R2STORE': { type: 'percent', value: 15, description: 'خصم 15%' }
        };

        document.addEventListener('DOMContentLoaded', () => {
            const savedDiscount = localStorage.getItem('appliedDiscount');
            if (savedDiscount) {
                appliedDiscount = JSON.parse(savedDiscount);
            }
            renderCartItems();
            updateSummary();
        });

        function renderCartItems() {
            const container = document.getElementById('cartItemsContainer');
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-shopping-cart"></i>
                        <h3>سلتك فارغة</h3>
                        <p>يبدو أنك لم تضف أي منتجات بعد. ابدأ التسوق الآن!</p>
                        <a href="index.html" class="btn btn-primary">
                            <i class="fas fa-store"></i> تصفح المنتجات
                        </a>
                    </div>
                `;
                document.getElementById('checkoutBtn').disabled = true;
                return;
            }
            
            document.getElementById('checkoutBtn').disabled = false;
            
            let html = '';
            cart.forEach(item => {
                const qty = item.quantity || 1;
                const itemTotal = item.price * qty;
                
                html += `
                    <div class="cart-item">
                        <div class="cart-item-image">
                            ${item.image ? `<img src="${item.image}" alt="${item.title}">` : (item.icon || '📦')}
                        </div>
                        <div class="cart-item-info">
                            <h3 class="cart-item-title">${item.title}</h3>
                            <div class="cart-item-price">${item.price} $</div>
                            <div class="quantity-control">
                                <button class="quantity-btn" onclick="updateQuantity(${item.id}, -1)">
                                    <i class="fas fa-minus"></i>
                                </button>
                                <span class="quantity-value">${qty}</span>
                                <button class="quantity-btn" onclick="updateQuantity(${item.id}, 1)">
                                    <i class="fas fa-plus"></i>
                                </button>
                                <button class="remove-btn" onclick="removeItem(${item.id})">
                                    <i class="fas fa-trash"></i> حذف
                                </button>
                            </div>
                        </div>
                        <div class="cart-item-total">
                            <div class="cart-item-total-label">المجموع</div>
                            <div class="cart-item-total-value">${itemTotal.toFixed(2)} $</div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        function updateQuantity(id, change) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.quantity = (item.quantity || 1) + change;
                if (item.quantity <= 0) {
                    removeItem(id);
                } else {
                    saveCart();
                    renderCartItems();
                    updateSummary();
                }
            }
        }

        function removeItem(id) {
            if (!confirm('هل أنت متأكد من حذف هذا المنتج من السلة؟')) return;
            cart = cart.filter(i => i.id !== id);
            saveCart();
            renderCartItems();
            updateSummary();
            
            if (cart.length === 0) {
                localStorage.removeItem('appliedDiscount');
                appliedDiscount = null;
            }
        }

        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cart));
        }

        function updateSummary() {
            const count = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
            const subtotal = cart.reduce((sum, item) => sum + (item.price * (item.quantity || 1)), 0);
            
            let discountAmount = 0;
            if (appliedDiscount) {
                if (appliedDiscount.type === 'percent') {
                    discountAmount = subtotal * (appliedDiscount.value / 100);
                } else if (appliedDiscount.type === 'fixed') {
                    discountAmount = appliedDiscount.value;
                }
                if (discountAmount > subtotal) {
                    discountAmount = subtotal;
                }
            }
            
            const total = subtotal - discountAmount;
            
            document.getElementById('summaryCount').textContent = count;
            document.getElementById('summarySubtotal').textContent = subtotal.toFixed(2) + ' $';
            
            const discountRow = document.getElementById('discountRow');
            const discountAmountEl = document.getElementById('discountAmount');
            if (appliedDiscount) {
                discountRow.style.display = 'flex';
                discountAmountEl.textContent = '-' + discountAmount.toFixed(2) + ' $';
            } else {
                discountRow.style.display = 'none';
            }
            
            document.getElementById('summaryTotal').textContent = total.toFixed(2) + ' $';
        }

        function applyDiscount() {
            const codeInput = document.getElementById('discountCode');
            const messageEl = document.getElementById('discountMessage');
            const appliedEl = document.getElementById('discountApplied');
            const appliedTextEl = document.getElementById('discountAppliedText');
            const btn = document.getElementById('applyDiscountBtn');
            
            const code = codeInput.value.trim().toUpperCase();
            
            if (!code) {
                showMessage('⚠️ أدخل كود الخصم', 'error');
                return;
            }
            
            if (appliedDiscount) {
                showMessage('⚠️ هناك خصم مطبق بالفعل', 'error');
                return;
            }
            
            if (cart.length === 0) {
                showMessage('⚠️ السلة فارغة!', 'error');
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحقق...';
            
            setTimeout(() => {
                if (discountCodes[code]) {
                    appliedDiscount = {
                        code: code,
                        type: discountCodes[code].type,
                        value: discountCodes[code].value,
                        description: discountCodes[code].description
                    };
                    
                    localStorage.setItem('appliedDiscount', JSON.stringify(appliedDiscount));
                    
                    showMessage('✅ تم تطبيق الخصم: ' + appliedDiscount.description, 'success');
                    
                    appliedTextEl.textContent = `${code} - ${appliedDiscount.description}`;
                    appliedEl.style.display = 'flex';
                    
                    codeInput.value = '';
                    codeInput.disabled = true;
                    btn.disabled = true;
                    
                    updateSummary();
                } else {
                    showMessage('❌ كود الخصم غير صالح', 'error');
                }
                
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-check"></i> تطبيق';
            }, 500);
        }

        function removeDiscount() {
            appliedDiscount = null;
            localStorage.removeItem('appliedDiscount');
            
            const codeInput = document.getElementById('discountCode');
            const messageEl = document.getElementById('discountMessage');
            const appliedEl = document.getElementById('discountApplied');
            
            codeInput.disabled = false;
            appliedEl.style.display = 'none';
            messageEl.style.display = 'none';
            
            updateSummary();
        }

        function showMessage(text, type) {
            const messageEl = document.getElementById('discountMessage');
            messageEl.textContent = text;
            messageEl.className = 'discount-message ' + type;
            messageEl.style.display = 'block';
            
            setTimeout(() => {
                messageEl.style.display = 'none';
            }, 5000);
        }

        function proceedToCheckout() {
            if (cart.length === 0) {
                alert('⚠️ السلة فارغة!');
                return;
            }
            
            const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
            if (!currentUser) {
                if (confirm('🔐 يجب تسجيل الدخول لإتمام الشراء. هل تريد التسجيل الآن؟')) {
                    window.location.href = 'index.html#login';
                }
                return;
            }
            
            window.location.href = 'checkout.html';
        }
    </script>
</body>
</html>
