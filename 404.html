<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <title>المتجر غير موجود</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: #0f0f1e;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .error-container {
      text-align: center;
      padding: 50px;
    }
    h1 {
      font-size: 8em;
      color: #e74c3c;
      margin-bottom: 20px;
    }
    p {
      font-size: 1.5em;
      margin-bottom: 30px;
    }
    a {
      display: inline-block;
      background: #6366f1;
      color: #fff;
      padding: 15px 30px;
      text-decoration: none;
      border-radius: 10px;
      transition: 0.3s;
    }
    a:hover {
      background: #4f46e5;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="error-container">
    <h1>404</h1>
    <p>المتجر غير موجود أو تم حذفه</p>
    <a href="/">العودة للصفحة الرئيسية</a>
  </div>
</body>
</html>
