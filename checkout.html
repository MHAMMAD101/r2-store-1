<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الطلب | R2 STORE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="images/logo.png">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --success: #10b981;
            --danger: #ef4444;
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --bg-hover: #1a1a25;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --border: rgba(255, 255, 255, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', 'Segoe UI', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-primary); line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
        .header { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 1rem 0; position: sticky; top: 0; z-index: 100; }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 1rem; text-decoration: none; }
        .logo-circle { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .logo-circle img { width: 100%; height: 100%; object-fit: cover; }
        .logo-text { font-size: 1.5rem; font-weight: 900; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-actions { display: flex; gap: 1rem; align-items: center; }
        .btn { padding: 0.75rem 1.5rem; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 0.5rem; transition: all 0.3s; text-decoration: none; font-size: 1rem; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4); }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text-primary); }
        .btn-outline:hover { border-color: var(--primary); }
        .checkout-page { padding: 4rem 0; min-height: 100vh; }
        .checkout-container { max-width: 1200px; margin: 0 auto; }
        .checkout-header { margin-bottom: 3rem; display: flex; justify-content: space-between; align-items: center; padding-bottom: 1.5rem; border-bottom: 2px solid var(--border); }
        .checkout-header h1 { font-size: 2rem; color: var(--primary); display: flex; align-items: center; gap: 0.75rem; }
        .checkout-content { display: grid; grid-template-columns: 1fr 450px; gap: 2.5rem; }
        .checkout-items, .checkout-summary { background: var(--bg-card); border-radius: 20px; padding: 2.5rem; border: 1px solid var(--border); }
        .checkout-items h2, .checkout-summary h2 { margin-bottom: 2rem; font-size: 1.5rem; color: var(--primary); }
        .checkout-item { background: var(--bg-dark); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid var(--border); }
        .checkout-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .quantity-selector { display: flex; align-items: center; gap: 1rem; }
        .quantity-btn { width: 40px; height: 40px; border-radius: 10px; border: 2px solid var(--border); background: var(--bg-card); color: var(--text-primary); cursor: pointer; transition: all 0.3s; }
        .quantity-btn:hover { background: var(--primary); border-color: var(--primary); transform: scale(1.1); }
        .payment-method { padding: 1.5rem; border: 2px solid var(--border); border-radius: 16px; margin-bottom: 1.25rem; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 1.25rem; background: var(--bg-dark); }
        .payment-method:hover, .payment-method.active { border-color: var(--primary); background: rgba(99, 102, 241, 0.1); }
        .payment-method-icon { font-size: 2.5rem; }
        .payment-method-info { flex: 1; }
        .payment-method-name { font-weight: 700; margin-bottom: 0.35rem; }
        .payment-method-details { font-size: 0.85rem; color: var(--text-muted); }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 1.25rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border); }
        .summary-row.total { font-size: 1.6rem; font-weight: 800; border-bottom: none; color: var(--primary); margin-top: 1rem; padding-top: 1rem; border-top: 2px solid var(--border); }
        .checkout-btn { width: 100%; padding: 1.4rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; border-radius: 16px; font-size: 1.2rem; font-weight: 700; cursor: pointer; transition: all 0.3s; margin-top: 1.5rem; box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3); }
        .checkout-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(99, 102, 241, 0.5); }
        .checkout-btn:disabled { background: var(--text-muted); cursor: not-allowed; transform: none; }
        .form-field textarea { width: 100%; padding: 1rem; background: var(--bg-dark); border: 2px solid var(--border); border-radius: 12px; color: var(--text-primary); font-size: 1rem; resize: vertical; transition: all 0.3s; }
        .form-field textarea:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
        .discount-section { background: var(--bg-dark); border-radius: 16px; padding: 1.5rem; margin: 1.5rem 0; border: 2px solid var(--border); }
        .discount-section h4 { margin-bottom: 1rem; color: var(--primary); display: flex; align-items: center; gap: 0.5rem; }
        .discount-input-group { display: flex; gap: 0.75rem; }
        .discount-input { flex: 1; padding: 0.75rem 1rem; background: var(--bg-card); border: 2px solid var(--border); border-radius: 12px; color: var(--text-primary); font-size: 1rem; transition: all 0.3s; text-transform: uppercase; }
        .discount-input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
        .discount-btn { padding: 0.75rem 1.5rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: all 0.3s; white-space: nowrap; }
        .discount-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(99, 102, 241, 0.4); }
        .discount-btn:disabled { background: var(--text-muted); cursor: not-allowed; transform: none; }
        .discount-message { margin-top: 0.75rem; padding: 0.75rem; border-radius: 10px; font-size: 0.9rem; display: none; }
        .discount-message.success { display: block; background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); color: var(--success); }
        .discount-message.error { display: block; background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: var(--danger); }
        .discount-applied { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); border-radius: 10px; margin-top: 0.75rem; }
        .discount-applied-text { color: var(--success); font-weight: 700; font-size: 0.9rem; }
        .discount-remove-btn { background: var(--danger); color: white; border: none; padding: 0.25rem 0.75rem; border-radius: 8px; cursor: pointer; font-size: 0.85rem; transition: all 0.3s; }
        .discount-remove-btn:hover { background: #dc2626; transform: scale(1.05); }
        .summary-row.discount { color: var(--success); font-weight: 700; }
        .footer { background: var(--bg-card); border-top: 1px solid var(--border); padding: 2rem 0; margin-top: 4rem; }
        .footer-content { text-align: center; color: var(--text-muted); }
        @media (max-width: 968px) { .checkout-content { grid-template-columns: 1fr; } .checkout-summary { position: static; } .checkout-header h1 { font-size: 1.5rem; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">
                    <div class="logo-circle"><img src="images/logo.png" alt="R2" onerror="this.style.display='none'"></div>
                    <span class="logo-text">STORE</span>
                </a>
                <div class="nav-actions">
                    <a href="index.html" class="btn btn-outline"><i class="fas fa-store"></i> المتجر</a>
                </div>
            </div>
        </div>
    </header>

    <div class="checkout-page">
        <div class="checkout-container">
            <div class="checkout-header">
                <h1><i class="fas fa-shopping-cart"></i> إتمام الطلب</h1>
                <a href="cart.html" class="btn btn-outline"><i class="fas fa-arrow-right"></i> العودة للسلة</a>
            </div>

            <div class="checkout-content">
                <div class="checkout-items">
                    <h2><i class="fas fa-box"></i> المنتجات في السلة</h2>
                    <div id="checkoutItemsList"></div>
                    <div class="form-field" style="margin-top: 2rem;">
                        <label><i class="fas fa-comment"></i> ملاحظات إضافية (اختياري)</label>
                        <textarea id="checkoutNotes" rows="3" placeholder="أي ملاحظات خاصة بطلبك..."></textarea>
                    </div>
                </div>

                <div class="checkout-summary">
                    <h2><i class="fas fa-receipt"></i> ملخص الطلب</h2>
                    <div class="summary-row"><span>عدد المنتجات:</span><span id="summaryCount">0</span></div>
                    <div class="summary-row"><span>المجموع:</span><span id="summarySubtotal">0 $</span></div>
                    
                    <div class="discount-section">
                        <h4><i class="fas fa-tag"></i> كود الخصم</h4>
                        <div class="discount-input-group">
                            <input type="text" id="discountCode" class="discount-input" placeholder="أدخل الكود" maxlength="20">
                            <button class="discount-btn" onclick="applyDiscount()" id="applyDiscountBtn">
                                <i class="fas fa-check"></i> تطبيق
                            </button>
                        </div>
                        <div id="discountMessage" class="discount-message"></div>
                        <div id="discountApplied" class="discount-applied" style="display: none;">
                            <span class="discount-applied-text" id="discountAppliedText"></span>
                            <button class="discount-remove-btn" onclick="removeDiscount()">
                                <i class="fas fa-times"></i> إزالة
                            </button>
                        </div>
                    </div>
                    
                    <div class="summary-row discount" id="discountRow" style="display: none;">
                        <span>الخصم:</span>
                        <span id="discountAmount">-0 $</span>
                    </div>
                    
                    <div class="summary-row total"><span>الإجمالي:</span><span id="summaryTotal">0 $</span></div>

                    <div style="margin: 2rem 0;">
                        <h3 style="margin-bottom: 1rem; color: var(--primary);"><i class="fas fa-credit-card"></i> طريقة الدفع</h3>
                        <div id="paymentMethodsList"></div>
                    </div>

                    <button class="checkout-btn" onclick="processCheckout()" id="checkoutButton">
                        <i class="fas fa-check-circle"></i> تأكيد الطلب
                    </button>

                    <p style="text-align: center; margin-top: 1rem; color: var(--text-muted); font-size: 0.9rem;">
                        <i class="fas fa-shield-alt"></i> دفع آمن 100%
                    </p>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>© 2024 <strong>R2 STORE</strong>. جميع الحقوق محفوظة</p>
            </div>
        </div>
    </footer>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let cart = [];
        let paymentMethods = [];
        let selectedPayment = null;
        let token = localStorage.getItem('token');
        let currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
        let appliedDiscount = null;
        let discountCodes = {
            'WELCOME10': { type: 'percent', value: 10, description: 'خصم 10%' },
            'SAVE20': { type: 'percent', value: 20, description: 'خصم 20%' },
            'FIXED5': { type: 'fixed', value: 5, description: 'خصم 5$' },
            'FIXED10': { type: 'fixed', value: 10, description: 'خصم 10$' },
            'R2STORE': { type: 'percent', value: 15, description: 'خصم 15%' }
        };

        if (!currentUser || !token) {
            alert('🔐 يجب تسجيل الدخول أولاً لإتمام الشراء');
            window.location.href = 'index.html';
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadCart();
            loadPaymentMethods();
            
            const savedDiscount = localStorage.getItem('appliedDiscount');
            if (savedDiscount) {
                appliedDiscount = JSON.parse(savedDiscount);
            }
        });

        function loadCart() {
            const saved = localStorage.getItem('cart');
            if (saved) {
                cart = JSON.parse(saved);
                renderCartItems();
            } else {
                alert('⚠️ السلة فارغة!');
                window.location.href = 'cart.html';
            }
        }

        function renderCartItems() {
            const container = document.getElementById('checkoutItemsList');
            if (!container) return;
            
            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:3rem;">السلة فارغة</p>';
                updateSummary();
                return;
            }
            
            let html = '';
            cart.forEach(item => {
                const qty = item.quantity || 1;
                const total = item.price * qty;
                
                html += `<div class="checkout-item">
                    <div class="checkout-item-header">
                        <span class="checkout-item-title">${item.icon || '📦'} ${item.title}</span>
                        <span class="checkout-item-price" style="color:var(--primary);font-weight:700;">${item.price} $</span>
                    </div>
                    <div class="quantity-selector">
                        <button class="quantity-btn" onclick="updateQuantity(${item.id}, -1)"><i class="fas fa-minus"></i></button>
                        <span style="font-weight:700;min-width:40px;text-align:center;font-size:1.1rem;">${qty}</span>
                        <button class="quantity-btn" onclick="updateQuantity(${item.id}, 1)"><i class="fas fa-plus"></i></button>
                        <button class="btn btn-danger btn-sm" onclick="removeItem(${item.id})" style="margin-right:auto;">
                            <i class="fas fa-trash"></i> حذف
                        </button>
                    </div>
                    <div style="margin-top:1rem;font-weight:700;color:var(--primary);border-top:1px solid var(--border);padding-top:0.75rem;">
                        المجموع: ${total.toFixed(2)} $
                    </div>
                </div>`;
            });
            
            container.innerHTML = html;
            updateSummary();
        }

        function updateSummary() {
            const count = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
            const subtotal = cart.reduce((sum, item) => sum + (item.price * (item.quantity || 1)), 0);
            
            let discountAmount = 0;
            if (appliedDiscount) {
                if (appliedDiscount.type === 'percent') {
                    discountAmount = subtotal * (appliedDiscount.value / 100);
                } else if (appliedDiscount.type === 'fixed') {
                    discountAmount = appliedDiscount.value;
                }
                if (discountAmount > subtotal) discountAmount = subtotal;
            }
            
            const total = subtotal - discountAmount;
            
            document.getElementById('summaryCount').textContent = count;
            document.getElementById('summarySubtotal').textContent = subtotal.toFixed(2) + ' $';
            
            const discountRow = document.getElementById('discountRow');
            const discountAmountEl = document.getElementById('discountAmount');
            if (appliedDiscount) {
                discountRow.style.display = 'flex';
                discountAmountEl.textContent = '-' + discountAmount.toFixed(2) + ' $';
            } else {
                discountRow.style.display = 'none';
            }
            
            document.getElementById('summaryTotal').textContent = total.toFixed(2) + ' $';
        }

        function updateQuantity(id, change) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.quantity = (item.quantity || 1) + change;
                if (item.quantity <= 0) removeItem(id);
                else { saveCart(); renderCartItems(); updateSummary(); }
            }
        }

        function removeItem(id) {
            cart = cart.filter(i => i.id !== id);
            saveCart();
            renderCartItems();
            updateSummary();
            if (cart.length === 0) {
                alert('⚠️ السلة فارغة!');
                window.location.href = 'cart.html';
            }
        }

        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cart));
        }

        async function loadPaymentMethods() {
            try {
                const res = await fetch(`${API_URL}/payment-methods`);
                const data = await res.json();
                
                if (res.ok && data.length > 0) {
                    paymentMethods = data;
                } else {
                    paymentMethods = [
                        { id: 1, name: 'بطاقة ائتمان', type: 'card', details: 'Visa, MasterCard' },
                        { id: 2, name: 'Apple Pay', type: 'apple_pay', details: '' },
                        { id: 3, name: 'STC Pay', type: 'stc_pay', details: '' },
                        { id: 4, name: 'PayPal', type: 'paypal', details: '' },
                        { id: 5, name: 'تحويل بنكي', type: 'bank_transfer', details: 'البنك: الراجحي' }
                    ];
                }
            } catch (e) {
                paymentMethods = [
                    { id: 1, name: 'بطاقة ائتمان', type: 'card', details: 'Visa, MasterCard' },
                    { id: 2, name: 'Apple Pay', type: 'apple_pay', details: '' },
                    { id: 3, name: 'STC Pay', type: 'stc_pay', details: '' },
                    { id: 4, name: 'PayPal', type: 'paypal', details: '' },
                    { id: 5, name: 'تحويل بنكي', type: 'bank_transfer', details: 'البنك: الراجحي' }
                ];
            }
            renderPaymentMethods();
        }

        function renderPaymentMethods() {
            const container = document.getElementById('paymentMethodsList');
            if (!container) return;
            
            container.innerHTML = '';
            
            if (!paymentMethods || paymentMethods.length === 0) {
                container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:2rem;">لا توجد طرق دفع متاحة</p>';
                return;
            }
            
            const icons = { 'card': '💳', 'apple_pay': '🍎', 'stc_pay': '📱', 'paypal': '🅿️', 'bank_transfer': '🏦', 'cash': '💵' };
            
            paymentMethods.forEach(method => {
                const div = document.createElement('div');
                div.className = 'payment-method';
                div.onclick = () => selectPayment(method.type);
                div.dataset.type = method.type;
                
                div.innerHTML = `
                    <div class="payment-method-icon">${icons[method.type] || '💰'}</div>
                    <div class="payment-method-info">
                        <div class="payment-method-name">${method.name}</div>
                        ${method.details ? `<div class="payment-method-details">${method.details}</div>` : ''}
                    </div>
                    <input type="radio" name="payment" value="${method.type}" ${selectedPayment === method.type ? 'checked' : ''} style="width:20px;height:20px;cursor:pointer;">
                `;
                
                container.appendChild(div);
            });
        }

        function selectPayment(type) {
            selectedPayment = type;
            document.querySelectorAll('.payment-method').forEach(el => {
                const isActive = el.dataset.type === type;
                el.classList.toggle('active', isActive);
                const radio = el.querySelector('input[type="radio"]');
                if (radio) radio.checked = isActive;
            });
        }

        function applyDiscount() {
            const codeInput = document.getElementById('discountCode');
            const messageEl = document.getElementById('discountMessage');
            const appliedEl = document.getElementById('discountApplied');
            const appliedTextEl = document.getElementById('discountAppliedText');
            const btn = document.getElementById('applyDiscountBtn');
            
            const code = codeInput.value.trim().toUpperCase();
            
            if (!code) { showMessage('⚠️ أدخل كود الخصم', 'error'); return; }
            if (appliedDiscount) { showMessage('⚠️ هناك خصم مطبق بالفعل', 'error'); return; }
            if (cart.length === 0) { showMessage('⚠️ السلة فارغة!', 'error'); return; }
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحقق...';
            
            setTimeout(() => {
                if (discountCodes[code]) {
                    appliedDiscount = {
                        code: code,
                        type: discountCodes[code].type,
                        value: discountCodes[code].value,
                        description: discountCodes[code].description
                    };
                    localStorage.setItem('appliedDiscount', JSON.stringify(appliedDiscount));
                    showMessage('✅ تم تطبيق الخصم: ' + appliedDiscount.description, 'success');
                    appliedTextEl.textContent = `${code} - ${appliedDiscount.description}`;
                    appliedEl.style.display = 'flex';
                    codeInput.value = '';
                    codeInput.disabled = true;
                    btn.disabled = true;
                    updateSummary();
                } else {
                    showMessage('❌ كود الخصم غير صالح', 'error');
                }
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-check"></i> تطبيق';
            }, 500);
        }

        function removeDiscount() {
            appliedDiscount = null;
            localStorage.removeItem('appliedDiscount');
            const codeInput = document.getElementById('discountCode');
            const messageEl = document.getElementById('discountMessage');
            const appliedEl = document.getElementById('discountApplied');
            codeInput.disabled = false;
            appliedEl.style.display = 'none';
            messageEl.style.display = 'none';
            updateSummary();
        }

        function showMessage(text, type) {
            const messageEl = document.getElementById('discountMessage');
            messageEl.textContent = text;
            messageEl.className = 'discount-message ' + type;
            messageEl.style.display = 'block';
            setTimeout(() => { messageEl.style.display = 'none'; }, 5000);
        }

        async function processCheckout() {
            console.log('🔄 معالجة الطلب...');
            
            if (cart.length === 0) { alert('⚠️ السلة فارغة!'); return; }
            if (!selectedPayment) { alert('⚠️ يرجى اختيار طريقة الدفع'); return; }
            
            const notes = document.getElementById('checkoutNotes')?.value || '';
            const subtotal = cart.reduce((sum, item) => sum + (item.price * (item.quantity || 1)), 0);
            
            let discountAmount = 0;
            let discountCode = null;
            if (appliedDiscount) {
                if (appliedDiscount.type === 'percent') {
                    discountAmount = subtotal * (appliedDiscount.value / 100);
                } else if (appliedDiscount.type === 'fixed') {
                    discountAmount = appliedDiscount.value;
                }
                if (discountAmount > subtotal) discountAmount = subtotal;
                discountCode = appliedDiscount.code;
            }
            
            const total = subtotal - discountAmount;
            
            console.log('📦 تفاصيل الطلب:', { items: cart.length, payment: selectedPayment, subtotal, discount: discountAmount, total });
            
            try {
                const res = await fetch(`${API_URL}/checkout`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({
                        items: cart.map(item => ({
                            product_id: item.id,
                            quantity: item.quantity || 1,
                            price: item.price,
                            extra_data: {}
                        })),
                        payment_method: selectedPayment,
                        total_amount: total,
                        extra_data: { notes: notes, discount_code: discountCode, discount_amount: discountAmount }
                    })
                });
                
                const result = await res.json();
                console.log('📥 النتيجة:', result);
                
                if (!res.ok) throw new Error(result.error || 'فشل إتمام الطلب');
                
                alert(`✅ ${result.message}\n\nرقم الطلب: ${result.order_id}\n${discountCode ? `الخصم: ${discountCode}\n` : ''}شكراً لطلبك!`);
                
                localStorage.removeItem('cart');
                localStorage.removeItem('appliedDiscount');
                window.location.href = 'index.html';
                
            } catch (error) {
                console.error('❌ خطأ في إتمام الطلب:', error);
                alert('❌ فشل إتمام الطلب:\n\n' + error.message);
            }
        }
    </script>
</body>
</html>
